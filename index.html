<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INNERA - 방꾸미기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="logo">INNĒRA</div>
      <div class="header-actions">
        <button id="btnFurniture" class="icon-btn">🛋 가구</button>
        <button id="btnClear" class="icon-btn">🗑 초기화</button>
        <button id="btnSave" class="icon-btn save-btn">💾 저장</button>
      </div>
    </header>

    <div class="room-wrap">
      <canvas id="roomCanvas"></canvas>

      <div id="furniturePanel" class="furniture-panel hidden">
        <div class="panel-header">
          <span>가구 선택</span>
          <button id="closePanel">✕</button>
        </div>
        <div class="hint">가구를 클릭 후 방으로 드래그하세요</div>
        <div class="furniture-grid" id="furnitureGrid"></div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">우상단 [가구] 버튼을 눌러 가구를 배치하세요!</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
